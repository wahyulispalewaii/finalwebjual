<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Setup Admin · dibantu.id</title><link rel="icon" href="/assets/img/favicon/favicon.ico"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.3.0/css/all.min.css"><link rel="stylesheet" href="/assets/css/style.css"><link rel="stylesheet" href="/assets/css/app.css"><link rel="stylesheet" href="/assets/css/admin.css"></head><body class="admin-body"><main class="auth-shell"><section class="auth-card"><img class="auth-logo" src="/assets/img/LOGO_DIBANTU.ID.png" alt="dibantu.id"><h1>Setup Admin Pertama</h1><p>Buat akun pemilik. Halaman ini otomatis terkunci setelah akun pertama berhasil dibuat.</p><div id="setupStatus"></div><form id="setupForm" class="auth-form"><div class="form-field"><label>Nama admin</label><input name="name" required value="admin"></div><div class="form-field"><label>Email</label><input name="email" type="email" required value="admin@dibantu.id"></div><div class="form-field"><label>Password</label><input name="password" type="password" required minlength="10" autocomplete="new-password"><span class="help-text">Minimal 10 karakter dengan huruf besar, huruf kecil, dan angka.</span></div><div class="form-field"><label>Ulangi password</label><input name="confirm_password" type="password" required minlength="10" autocomplete="new-password"></div><button id="setupButton" class="primary-action" type="submit">Buat Akun Pemilik</button></form></section></main><script src="/assets/js/app-core.js"></script><script src="/assets/js/admin-setup.js"></script></body></html>
